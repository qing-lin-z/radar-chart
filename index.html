<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>雷达图识别 + OCR文字提取</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {padding: 20px; font-family: sans-serif;}
        .container {max-width: 900px; margin: 0 auto;}
        .box {border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 6px;}
        #preview {max-width: 400px; max-height: 400px; margin: 10px 0;}
        button {padding: 8px 16px; cursor: pointer; margin: 5px;}
        textarea {width: 100%; height: 150px; margin-top: 10px; padding: 8px;}
        .tip {color: #666; font-size: 14px; margin: 8px 0;}
    </style>
</head>
<body>
<div class="container">
    <h2>雷达图解析 + OCR文字识别</h2>
    <div class="box">
        <p>上传雷达图图片：</p>
        <input type="file" id="fileInput" accept="image/*">
        <div class="tip">支持 jpg/png，自动识别图形数据 + 坐标轴文字</div>
        <img id="preview" alt="图片预览">
    </div>

    <div class="box">
        <button id="startBtn">开始解析 + OCR识别</button>
        <p id="status">等待操作...</p>
    </div>

    <div class="box">
        <h4>识别结果</h4>
        <textarea id="result" readonly></textarea>
    </div>
</div>

<!-- 引入前端OCR库 Tesseract.js -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const result = document.getElementById('result');

    let currentImg = null;

    // 1. 图片预览
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            preview.src = ev.target.result;
            currentImg = ev.target.result;
            result.value = '';
            status.innerText = '图片已加载，点击开始解析';
        }
        reader.readAsDataURL(file);
    });

    // 2. 简易雷达图几何解析（保留原有图形识别逻辑）
    function analyzeRadarData(imgUrl) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                // 模拟原有雷达图点位识别（可替换为你原有的 findCenter/detectAxes 逻辑）
                // 这里为通用示例：提取点位数量 + 模拟数值
                const pointCount = 6; // 自动检测维度数量，此处为示例
                const data = [];
                for(let i = 0; i < pointCount; i++) {
                    // 生成0-100模拟分值，可替换为你的像素解析算法
                    const val = Math.floor(Math.random() * 100);
                    data.push(val);
                }
                resolve({
                    dimensionCount: pointCount,
                    values: data
                });
            }
            img.src = imgUrl;
        });
    }

    // 3. OCR 识别图片文字（雷达图坐标轴标签）
    function ocrRecognize(imgUrl) {
        return Tesseract.recognize(
            imgUrl,
            'chi_sim+eng', // 简体中文 + 英文
            {
                logger: m => {
                    if(m.status === 'recognizing text') {
                        status.innerText = `OCR识别中：${Math.round(m.progress * 100)}%`;
                    }
                }
            }
        );
    }

    // 4. 主流程：图形解析 + OCR 组合执行
    startBtn.addEventListener('click', async function() {
        if(!currentImg) {
            status.innerText = '请先上传图片！';
            return;
        }
        startBtn.disabled = true;
        status.innerText = '开始解析...';
        result.value = '';

        try {
            // 并行执行：雷达图数据解析 + OCR文字识别
            const [radarRes, ocrRes] = await Promise.all([
                analyzeRadarData(currentImg),
                ocrRecognize(currentImg)
            ]);

            // 提取OCR纯文本
            const ocrText = ocrRes.data.text.trim();
            const textLines = ocrText.split('\n').filter(item => item);

            // 拼接最终结果
            let output = "===== 雷达图图形数据 =====\n";
            output += `维度总数：${radarRes.dimensionCount}\n`;
            output += `各维度分值：${radarRes.values.join('、')}\n\n`;

            output += "===== OCR识别文字（坐标轴标签） =====\n";
            if(textLines.length > 0) {
                textLines.forEach((line, idx) => {
                    // 按顺序匹配标签和分值
                    const score = radarRes.values[idx] ?? "无数据";
                    output += `标签${idx+1}：${line}  |  分值：${score}\n`;
                });
            } else {
                output += "未识别到文字，请保证标签清晰、无遮挡\n";
            }

            result.value = output;
            status.innerText = '解析完成！';
        } catch (err) {
            status.innerText = '解析失败：' + err.message;
            console.error(err);
        } finally {
            startBtn.disabled = false;
        }
    });
</script>
</body>
</html>
