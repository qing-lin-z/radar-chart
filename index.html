<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>检测雷达图 + OCR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  height: 100vh;
  display: flex;
  overflow: hidden;
}

.sidebar {
  width: 380px;
  min-width: 380px;
  background: #ffffff;
  border-right: 1px solid #e5e5ea;
  display: flex;
  flex-direction: column;
  z-index: 10;
  overflow: hidden;
}
.sidebar-header {
  padding: 20px 24px;
  border-bottom: 1px solid #e5e5ea;
  background: #ffffff;
  flex-shrink: 0;
}
.sidebar-header h1 {
  font-size: 20px;
  font-weight: 700;
  color: #1d1d1f;
  margin-bottom: 4px;
}
.sidebar-header p { font-size: 12px; color: #86868b; }

.sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-group label { font-size: 12px; color: #86868b; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select, .form-group textarea {
  background: #f5f5f7;
  border: 1px solid #d2d2d7;
  border-radius: 10px;
  padding: 10px 14px;
  color: #1d1d1f;
  font-size: 14px;
  outline: none;
  transition: all 0.2s;
  font-family: inherit;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: #0071e3;
  background: #ffffff;
  box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
}
.form-group input::placeholder, .form-group textarea::placeholder { color: #c7c7cc; }
.form-row { display: flex; gap: 10px; align-items: center; }
.form-row .form-group { flex: 1; }

.btn {
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: inherit;
}
.btn-primary { background: #0071e3; color: #fff; }
.btn-primary:hover { background: #0077ed; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,113,227,0.25); }
.btn-danger { background: #ff3b30; color: #fff; }
.btn-danger:hover { background: #e6352b; }
.btn-outline { background: #f5f5f7; border: 1px solid #d2d2d7; color: #1d1d1f; }
.btn-outline:hover { border-color: #0071e3; color: #0071e3; background: #ffffff; }
.btn-success { background: #34c759; color: #fff; }
.btn-success:hover { background: #30b350; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-block { width: 100%; }

.graph-area {
  flex: 1;
  position: relative;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
}
.graph-area svg { max-width: 100%; max-height: 100%; }

.graph-toolbar {
  position: absolute;
  top: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 5;
}
.graph-toolbar button {
  width: 40px; height: 40px;
  border-radius: 10px;
  border: 1px solid #e5e5ea;
  background: rgba(255,255,255,0.95);
  color: #86868b;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(10px);
  transition: all 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.graph-toolbar button:hover { border-color: #0071e3; color: #0071e3; }

.dim-list { max-height: 280px; overflow-y: auto; }
.dim-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: #f5f5f7;
  border-radius: 10px;
  margin-bottom: 6px;
  font-size: 13px;
}
.dim-item .idx { width: 20px; text-align: center; color: #0071e3; font-weight: 700; font-size: 11px; }
.dim-item input[type="text"] {
  flex: 1;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 5px 8px;
  color: #1d1d1f;
  font-size: 13px;
  outline: none;
}
.dim-item input[type="text"]:focus { border-color: #0071e3; background: #ffffff; }
.dim-item input[type="range"] { flex: 1; accent-color: #0071e3; }
.dim-item .val { width: 32px; text-align: right; font-size: 12px; color: #0071e3; font-weight: 600; }
.dim-item .del-btn {
  background: none; border: none; color: #ff3b30; cursor: pointer;
  font-size: 14px; padding: 2px 6px; border-radius: 4px;
}
.dim-item .del-btn:hover { background: rgba(255,59,48,0.08); }

.dataset-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.dataset-tab {
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid #e5e5ea;
  background: #f5f5f7;
  color: #86868b;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dataset-tab:hover { border-color: #0071e3; }
.dataset-tab.active { border-color: transparent; color: #fff; }
.dataset-tab .close { font-size: 11px; opacity: 0.5; }
.dataset-tab .close:hover { opacity: 1; }

.color-picker {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.color-opt {
  width: 28px; height: 28px;
  border-radius: 6px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
}
.color-opt:hover { transform: scale(1.1); }
.color-opt.selected { border-color: #1d1d1f; box-shadow: 0 0 0 2px #ffffff, 0 0 0 4px #0071e3; }

.upload-area {
  border: 2px dashed #d2d2d7;
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: #f5f5f7;
}
.upload-area:hover {
  border-color: #0071e3;
  background: #ffffff;
}
.upload-area.dragover {
  border-color: #0071e3;
  background: rgba(0,113,227,0.05);
}
.upload-area .icon { font-size: 32px; margin-bottom: 8px; }
.upload-area .text { font-size: 13px; color: #86868b; }
.upload-area .sub { font-size: 11px; color: #c7c7cc; margin-top: 4px; }

.ocr-result {
  background: #f5f5f7;
  border-radius: 10px;
  padding: 12px;
  margin-top: 8px;
}
.ocr-result .title {
  font-size: 12px;
  color: #86868b;
  margin-bottom: 8px;
  font-weight: 500;
}
.ocr-result .item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid #e5e5ea;
  font-size: 13px;
}
.ocr-result .item:last-child { border-bottom: none; }
.ocr-result .item .name { color: #1d1d1f; }
.ocr-result .item .val { color: #0071e3; font-weight: 600; min-width: 36px; text-align: right; }
.ocr-result .item input[type="range"] {
  width: 80px;
  margin-left: 8px;
  accent-color: #0071e3;
}

.tooltip {
  position: absolute;
  background: rgba(255,255,255,0.98);
  border: 1px solid #e5e5ea;
  border-radius: 12px;
  padding: 12px 16px;
  pointer-events: none;
  font-size: 13px;
  backdrop-filter: blur(20px);
  display: none;
  z-index: 20;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.tooltip .title { font-weight: 700; margin-bottom: 4px; }
.tooltip .val { color: #86868b; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #86868b; }

.empty-state {
  text-align: center;
  color: #c7c7cc;
  padding: 40px 20px;
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .text { font-size: 14px; }

.loading {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #e5e5ea;
  border-top-color: #0071e3;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#file-input { display: none; }

.preview-img {
  max-width: 100%;
  max-height: 120px;
  border-radius: 8px;
  margin-top: 8px;
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>检测雷达图 + OCR</h1>
    <p>Radar Chart Detector & OCR</p>
  </div>
  <div class="sidebar-body">

    <!-- 智能识别导入 -->
    <div class="form-group">
      <label>📷 智能识别导入</label>
      <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        <div class="icon">📤</div>
        <div class="text">点击或拖拽上传雷达图图片</div>
        <div class="sub">自动识别维度名称和数值，支持手动校正</div>
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
      <div id="ocr-status"></div>
      <div id="ocr-preview"></div>
    </div>

    <!-- 数据集切换 -->
    <div class="form-group">
      <label>📊 数据系列</label>
      <div class="dataset-tabs" id="dataset-tabs"></div>
      <button class="btn btn-outline btn-sm btn-block" onclick="addDataset()">添加数据系列</button>
    </div>

    <!-- 当前数据集编辑 -->
    <div class="form-group">
      <label>✏️ 当前系列名称</label>
      <input id="ds-name" placeholder="输入系列名称" onchange="updateDatasetName(this.value)" />
    </div>

    <div class="form-group">
      <label>🎨 系列颜色</label>
      <div class="color-picker" id="color-picker"></div>
    </div>

    <div class="form-group">
      <label>📐 维度数量</label>
      <div class="form-row">
        <input type="number" id="dim-count" value="0" min="3" max="12" placeholder="维度数" onchange="changeDimCount(this.value)" />
        <button class="btn btn-outline btn-sm" onclick="randomizeValues()">随机填充</button>
        <button class="btn btn-danger btn-sm" onclick="clearDataset()">清空数值</button>
      </div>
    </div>

    <div class="form-group">
      <label>📋 维度名称与数值 (0-100)</label>
      <div class="dim-list" id="dim-list"></div>
    </div>

    <div class="form-group">
      <label>⚙️ 显示选项</label>
      <div class="form-row" style="font-size:13px;gap:16px;color:#86868b;">
        <label><input type="checkbox" id="show-fill" checked onchange="render()"> 填充</label>
        <label><input type="checkbox" id="show-points" checked onchange="render()"> 节点</label>
        <label><input type="checkbox" id="show-grid" checked onchange="render()"> 网格</label>
        <label><input type="checkbox" id="show-labels" checked onchange="render()"> 标签</label>
      </div>
    </div>

    <div class="form-group">
      <label>💾 导出</label>
      <button class="btn btn-primary btn-block" onclick="exportPNG()">导出 PNG</button>
      <button class="btn btn-primary btn-block" onclick="exportSVG()">导出 SVG</button>
      <button class="btn btn-outline btn-block" onclick="exportJSON()">导出 JSON</button>
    </div>

  </div>
</div>

<div class="graph-area" id="graph">
  <div class="graph-toolbar">
    <button title="适应屏幕" onclick="fitView()">⊞</button>
  </div>
  <div class="tooltip" id="tooltip"></div>
</div>

<script>
const COLORS = [
  '#0071e3','#34c759','#ff9500','#ff3b30','#af52de',
  '#5856d6','#ff2d55','#5ac8fa','#ffcc00','#a2845e',
  '#64d2ff','#30d158','#ff375f','#bf5af2','#0a84ff'
];

let datasets = [];
let activeIdx = 0;
let ocrResult = null;

function initUI() {
  const cp = document.getElementById('color-picker');
  cp.innerHTML = COLORS.map((c, i) =>
    `<div class="color-opt${i===0?' selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor('${c}',this)"></div>`
  ).join('');

  updateDatasetTabs();
  updateDimList();
  render();

  const uploadArea = document.getElementById('upload-area');
  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
  });
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0) processImage(files[0]);
  });
}

function updateDatasetTabs() {
  const tabs = document.getElementById('dataset-tabs');
  if (datasets.length === 0) {
    tabs.innerHTML = '';
    return;
  }
  tabs.innerHTML = datasets.map((ds, i) => {
    const isActive = i === activeIdx;
    return `<div class="dataset-tab${isActive?' active':''}" style="${isActive?'background:'+ds.color:''}" onclick="switchDataset(${i})">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${ds.color}"></span>
      ${ds.name}
      ${datasets.length>1?`<span class="close" onclick="event.stopPropagation();removeDataset(${i})">✕</span>`:''}
    </div>`;
  }).join('');
}

function updateDimList() {
  if (datasets.length === 0) {
    document.getElementById('ds-name').value = '';
    document.getElementById('dim-count').value = 0;
    document.getElementById('dim-list').innerHTML = '<div class="empty-state"><div class="icon">📊</div><div class="text">点击「添加数据系列」或上传图片开始</div></div>';
    return;
  }

  const ds = datasets[activeIdx];
  document.getElementById('ds-name').value = ds.name;
  document.getElementById('dim-count').value = ds.dims.length;

  document.querySelectorAll('.color-opt').forEach(el => {
    el.classList.toggle('selected', el.dataset.color === ds.color);
  });

  const list = document.getElementById('dim-list');
  if (ds.dims.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📐</div><div class="text">设置维度数量后开始添加数据</div></div>';
    return;
  }

  list.innerHTML = ds.dims.map((d, i) => `
    <div class="dim-item">
      <span class="idx">${i+1}</span>
      <input type="text" value="${d.name}" placeholder="维度名称" onchange="updateDimName(${i},this.value)" />
      <input type="range" min="0" max="100" value="${d.value}" oninput="updateDimValue(${i},this.value);this.nextElementSibling.textContent=this.value" />
      <span class="val">${d.value}</span>
      ${ds.dims.length>3?`<button class="del-btn" onclick="removeDim(${i})">✕</button>`:''}
    </div>
  `).join('');
}

// ================ 图片识别（核心算法） ================
function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file) processImage(file);
}

function processImage(file) {
  const statusDiv = document.getElementById('ocr-status');
  const previewDiv = document.getElementById('ocr-preview');

  statusDiv.innerHTML = '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;color:#0071e3;"><span class="loading"></span>正在分析图片...</div>';
  previewDiv.innerHTML = '';

  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      analyzeRadarChart(img, (result) => {
        statusDiv.innerHTML = '<div style="padding:8px 0;color:#34c759;">✅ 识别完成，可手动校正后应用</div>';
        ocrResult = result;
        showOCRPreview(result, e.target.result);
      });
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ========== v4: HSV饱和度分割 + Tesseract.js OCR ==========
let tesseractReady = false;

// 预加载 Tesseract（轻量）
(function preloadOCR() {
  if (typeof Tesseract !== 'undefined') { tesseractReady = true; return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
  s.onload = () => { tesseractReady = true; };
  s.onerror = () => { console.warn('Tesseract.js 加载失败'); };
  document.head.appendChild(s);
})();

function analyzeRadarChart(img, callback) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const SIZE = 600;
  canvas.width = SIZE;
  canvas.height = SIZE;
  ctx.drawImage(img, 0, 0, SIZE, SIZE);
  const data = ctx.getImageData(0, 0, SIZE, SIZE).data;

  // 预计算每个像素的饱和度和亮度
  const satCache = new Float32Array(SIZE * SIZE);
  const lumCache = new Float32Array(SIZE * SIZE);
  for (let i = 0; i < data.length; i += 4) {
    const idx = i >> 2;
    const r = data[i], g = data[i + 1], b = data[i + 2];
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    satCache[idx] = max === 0 ? 0 : (max - min) / max;
    lumCache[idx] = (r + g + b) / 3;
  }

  const cx = SIZE / 2, cy = SIZE / 2;
  const NUM_RAYS = 720;
  const maxR = SIZE * 0.46;
  const edgeFn = new Float32Array(NUM_RAYS);

  // 自适应：判断是浅色背景+彩色多边形，还是深色背景+亮色多边形
  const cornerLum = sampleArea(lumCache, SIZE, SIZE * 0.05, SIZE * 0.05, 30);
  const isDarkBg = cornerLum < 100;

  for (let i = 0; i < NUM_RAYS; i++) {
    const angle = (i * 2 * Math.PI) / NUM_RAYS;
    edgeFn[i] = findRegionBoundary(SIZE, cx, cy,
      Math.cos(angle), Math.sin(angle), maxR, satCache, lumCache, isDarkBg);
  }

  // 如果结果太稀疏，降低阈值重试
  const nonZero = edgeFn.filter(v => v > 5).length;
  if (nonZero < NUM_RAYS * 0.3) {
    for (let i = 0; i < NUM_RAYS; i++) {
      const angle = (i * 2 * Math.PI) / NUM_RAYS;
      edgeFn[i] = findRegionBoundary(SIZE, cx, cy,
        Math.cos(angle), Math.sin(angle), maxR, satCache, lumCache, isDarkBg, true);
    }
  }

  smooth1D(edgeFn, 8);
  const vertices = detectVertices(edgeFn, NUM_RAYS, maxR);

  const axes = vertices.map(v => ({
    angle: (v.idx / NUM_RAYS) * 360,
    confidence: Math.round(v.score * 100) / 100
  }));
  const values = vertices.map(v =>
    Math.min(100, Math.max(0, Math.round((v.dist / (maxR * 0.80)) * 100)))
  );
  const dimensions = Array.from({length: vertices.length}, (_, i) => `维度${i+1}`).map(n => ({
    name: n, detected: false
  }));

  const result = { dimCount: vertices.length, dimensions, values, axes, center: { x: cx, y: cy } };

  if (tesseractReady && vertices.length >= 3) {
    runOCR(img, result).then(() => callback(result));
  } else {
    callback(result);
  }
}

function sampleArea(arr, size, cx, cy, radius) {
  let sum = 0, n = 0;
  for (let dx = -radius; dx <= radius; dx++) {
    for (let dy = -radius; dy <= radius; dy++) {
      if (dx * dx + dy * dy > radius * radius) continue;
      const x = Math.floor(cx + dx), y = Math.floor(cy + dy);
      if (x < 0 || x >= size || y < 0 || y >= size) continue;
      sum += arr[y * size + x]; n++;
    }
  }
  return n > 0 ? sum / n : 0;
}

// 沿射线追踪连续区域，找到最远边界（忽略孤点噪点）
function findRegionBoundary(size, cx, cy, cos, sin, maxR, satCache, lumCache, isDarkBg, relaxed) {
  let inRegion = false;
  let regionEnd = 0;
  let gapCount = 0;
  const gapLimit = relaxed ? 15 : 8;
  const minRun = relaxed ? 4 : 6;

  for (let r = 3; r < maxR; r++) {
    const x = Math.floor(cx + r * cos);
    const y = Math.floor(cy + r * sin);
    if (x < 0 || x >= size || y < 0 || y >= size) break;
    const idx = y * size + x;
    const isDataPx = isDarkBg ? lumCache[idx] > 100 : satCache[idx] > 0.06;

    if (isDataPx) {
      if (!inRegion) {
        let runLen = 1;
        for (let a = r + 1; a < Math.min(r + minRun + 1, maxR); a++) {
          const ax = Math.floor(cx + a * cos), ay = Math.floor(cy + a * sin);
          if (ax < 0 || ax >= size || ay < 0 || ay >= size) break;
          if (isDarkBg ? lumCache[ay * size + ax] > 100 : satCache[ay * size + ax] > 0.06) runLen++;
        }
        if (runLen >= minRun) { inRegion = true; r += runLen - 1; regionEnd = r; }
      } else { regionEnd = r; gapCount = 0; }
    } else if (inRegion) {
      gapCount++;
      if (gapCount >= gapLimit) break;
    }
  }
  return inRegion ? regionEnd : 0;
}

async function runOCR(img, result) {
  try {
    const worker = await Tesseract.createWorker('chi_sim+eng', 1, {
      logger: () => {}
    });
    const { data: { text } } = await worker.recognize(img);
    await worker.terminate();

    // 提取识别的词（中英文 + 数字）
    const words = text.match(/[\u4e00-\u9fff\w]+/g) || [];
    // 过滤太短的
    const labels = words.filter(w => w.length >= 2 && !/^\d+$/.test(w));
    // 去重
    const unique = [...new Set(labels)];

    if (unique.length >= result.dimCount) {
      // 只取前 N 个词作为维度名
      result.dimensions = unique.slice(0, result.dimCount).map((name, i) => ({
        name, detected: true
      }));
    }
  } catch (e) {
    console.warn('OCR失败:', e);
  }
}

function smooth1D(arr, windowSize) {
  const tmp = new Float32Array(arr.length);
  for (let i = 0; i < arr.length; i++) {
    let sum = 0, cnt = 0;
    for (let w = -windowSize; w <= windowSize; w++) {
      let idx = i + w;
      if (idx < 0) idx += arr.length;
      if (idx >= arr.length) idx -= arr.length;
      sum += arr[idx]; cnt++;
    }
    tmp[i] = sum / cnt;
  }
  arr.set(tmp);
}

function detectVertices(edgeFn, numRays, maxR) {
  // 计算边界均值
  let total = 0, validCnt = 0;
  for (let i = 0; i < numRays; i++) {
    if (edgeFn[i] > 5) { total += edgeFn[i]; validCnt++; }
  }
  const mean = validCnt > 0 ? total / validCnt : 0;
  const minVal = Math.max(8, mean * 0.45);

  // 找局部极大值
  const cand = [];
  const nb = 10;
  for (let i = 0; i < numRays; i++) {
    const cur = edgeFn[i];
    if (cur < minVal) continue;
    let isPeak = true;
    for (let d = 1; d <= nb; d++) {
      if (edgeFn[(i - d + numRays) % numRays] >= cur ||
          edgeFn[(i + d) % numRays] >= cur) { isPeak = false; break; }
    }
    if (!isPeak) continue;

    // 凸出度
    let basin = Infinity;
    for (let side = -1; side <= 1; side += 2) {
      for (let d = nb + 1; d <= 25; d++) {
        const idx = (i + side * d + numRays) % numRays;
        if (edgeFn[idx] < basin) basin = edgeFn[idx];
      }
    }
    const prominence = cur - basin;
    if (prominence > 5) cand.push({ idx: i, dist: cur, score: prominence / (cur + 1) });
  }

  if (cand.length === 0) return [];

  // 贪心选点
  cand.sort((a, b) => b.score - a.score);
  const sel = [];
  const gap = Math.floor(numRays / 20);
  for (const c of cand) {
    if (sel.some(s => {
      let d = Math.abs(c.idx - s.idx);
      if (d > numRays / 2) d = numRays - d;
      return d < gap;
    })) continue;
    sel.push(c);
  }

  sel.sort((a, b) => a.idx - b.idx);
  return sel;
}

// ================ OCR 预览与校正 ================
function showOCRPreview(result, imgDataUrl) {
  const previewDiv = document.getElementById('ocr-preview');
  const anyDetected = result.dimensions.some(d => d.detected);

  let html = '<div style="margin-top:8px;">';
  html += `<img src="${imgDataUrl}" class="preview-img" />`;
  html += '<div class="ocr-result">';
  html += `<div class="title">识别结果（共 ${result.dimCount} 维）${anyDetected ? ' — AI文字识别' : ''} — 可手动编辑</div>`;

  result.dimensions.forEach((dim, i) => {
    const val = result.values[i] || 0;
    html += `<div class="item">
      <input type="text" value="${dim.name}" onchange="ocrResult.dimensions[${i}].name=this.value" style="border:1px solid #d2d2d7;border-radius:6px;padding:4px 8px;font-size:13px;width:110px;margin-right:8px;">
      <div style="display:flex;align-items:center;">
        <input type="range" min="0" max="100" value="${val}"
          oninput="ocrResult.values[${i}]=parseInt(this.value);this.nextElementSibling.textContent=this.value;renderOCRPreviewChart()" />
        <span class="val" style="margin-left:6px;">${val}</span>
      </div>
    </div>`;
  });

  html += '</div>';
  html += `<button class="btn btn-success btn-block" style="margin-top:10px;" onclick="applyOCRResult()">应用识别结果</button>`;
  html += `<button class="btn btn-outline btn-block" style="margin-top:6px;" onclick="clearOCRResult()">清除</button>`;
  html += '</div>';

  previewDiv.innerHTML = html;

  // 渲染一个小的预览图
  renderOCRPreviewChart();
}

function renderOCRPreviewChart() {
  if (!ocrResult) return;
  // 预览图已经在主图区域通过 render() 显示
}

function applyOCRResult() {
  if (!ocrResult) return;

  const usedColors = datasets.map(d => d.color);
  const color = COLORS.find(c => !usedColors.includes(c)) || COLORS[0];

  const newDataset = {
    name: `识别数据${datasets.length + 1}`,
    color: color,
    dims: ocrResult.dimensions.map((dim, i) => ({
      name: dim.name,
      value: ocrResult.values[i] || 0
    }))
  };

  datasets.push(newDataset);
  activeIdx = datasets.length - 1;

  updateDatasetTabs();
  updateDimList();
  render();

  document.getElementById('ocr-preview').innerHTML = '';
  document.getElementById('ocr-status').innerHTML = '<div style="padding:8px 0;color:#34c759;">✅ 已应用到图表</div>';
}

function clearOCRResult() {
  ocrResult = null;
  document.getElementById('ocr-preview').innerHTML = '';
  document.getElementById('ocr-status').innerHTML = '';
  document.getElementById('file-input').value = '';
}

// ================ 数据操作 ================
function switchDataset(idx) {
  activeIdx = idx;
  updateDatasetTabs();
  updateDimList();
  render();
}

function addDataset() {
  const usedColors = datasets.map(d => d.color);
  const color = COLORS.find(c => !usedColors.includes(c)) || COLORS[datasets.length % COLORS.length];
  const dimCount = datasets.length > 0 ? datasets[0].dims.length : 0;
  let dims = [];
  if (dimCount > 0) {
    for (let i = 0; i < dimCount; i++) {
      const baseName = datasets[0].dims[i]?.name || `维度${i+1}`;
      dims.push({ name: baseName, value: 0 });
    }
  }
  datasets.push({ name: `系列${datasets.length+1}`, color, dims });
  activeIdx = datasets.length - 1;
  updateDatasetTabs();
  updateDimList();
  render();
}

function removeDataset(idx) {
  if (datasets.length <= 1) {
    datasets = [];
    activeIdx = 0;
  } else {
    datasets.splice(idx, 1);
    if (activeIdx >= datasets.length) activeIdx = datasets.length - 1;
  }
  updateDatasetTabs();
  updateDimList();
  render();
}

function updateDatasetName(name) {
  if (datasets.length === 0) return;
  datasets[activeIdx].name = name.trim() || '未命名';
  updateDatasetTabs();
}

function selectColor(color, el) {
  if (datasets.length === 0) return;
  datasets[activeIdx].color = color;
  document.querySelectorAll('.color-opt').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  updateDatasetTabs();
  render();
}

function changeDimCount(count) {
  if (datasets.length === 0) {
    alert('请先添加一个数据系列');
    document.getElementById('dim-count').value = 0;
    return;
  }
  count = Math.max(3, Math.min(12, parseInt(count) || 3));
  datasets.forEach(ds => {
    while (ds.dims.length < count) {
      ds.dims.push({ name: `维度${ds.dims.length+1}`, value: 0 });
    }
    while (ds.dims.length > count) {
      ds.dims.pop();
    }
  });
  updateDimList();
  render();
}

function updateDimName(idx, name) {
  if (datasets.length === 0) return;
  const val = name.trim() || `维度${idx+1}`;
  datasets.forEach(ds => {
    if (ds.dims[idx]) ds.dims[idx].name = val;
  });
  render();
}

function updateDimValue(idx, val) {
  if (datasets.length === 0) return;
  datasets[activeIdx].dims[idx].value = Math.max(0, Math.min(100, parseInt(val) || 0));
  render();
}

function removeDim(idx) {
  if (datasets.length === 0) return;
  if (datasets[0].dims.length <= 3) return alert('至少需要3个维度');
  datasets.forEach(ds => ds.dims.splice(idx, 1));
  updateDimList();
  render();
}

function randomizeValues() {
  if (datasets.length === 0) return;
  datasets[activeIdx].dims.forEach(d => d.value = Math.floor(Math.random() * 90) + 10);
  updateDimList();
  render();
}

function clearDataset() {
  if (datasets.length === 0) return;
  datasets[activeIdx].dims.forEach(d => d.value = 0);
  updateDimList();
  render();
}

// ================ 渲染 ================
function render() {
  const container = document.getElementById('graph');
  const w = container.clientWidth;
  const h = container.clientHeight;

  const toolbar = container.querySelector('.graph-toolbar');
  const tooltip = container.querySelector('.tooltip');

  if (datasets.length === 0 || datasets[0].dims.length === 0) {
    container.innerHTML = '';
    container.appendChild(toolbar);
    container.appendChild(tooltip);
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<div class="icon" style="font-size:64px;margin-bottom:16px;">📊</div><div style="font-size:16px;color:#86868b;">点击左侧「添加数据系列」或上传图片开始</div>';
    empty.style.cssText = 'text-align:center;color:#c7c7cc;';
    container.appendChild(empty);
    return;
  }

  const size = Math.min(w, h) * 0.72;
  const cx = w / 2;
  const cy = h / 2;
  const radius = size / 2 - 50;
  const levels = 5;

  const showFill = document.getElementById('show-fill').checked;
  const showPoints = document.getElementById('show-points').checked;
  const showGrid = document.getElementById('show-grid').checked;
  const showLabels = document.getElementById('show-labels').checked;

  const dimNames = datasets[0].dims.map(d => d.name);
  const dimCount = dimNames.length;
  const angleStep = (Math.PI * 2) / dimCount;

  let svg = `<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<rect width="${w}" height="${h}" fill="#ffffff"/>`;

  if (showGrid) {
    for (let i = 1; i <= levels; i++) {
      const r = (radius / levels) * i;
      let points = '';
      for (let j = 0; j < dimCount; j++) {
        const angle = j * angleStep - Math.PI / 2;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        points += `${x},${y} `;
      }
      svg += `<polygon points="${points}" fill="none" stroke="#e5e5ea" stroke-width="1"/>`;
    }
    for (let j = 0; j < dimCount; j++) {
      const angle = j * angleStep - Math.PI / 2;
      const x = cx + radius * Math.cos(angle);
      const y = cy + radius * Math.sin(angle);
      svg += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#e5e5ea" stroke-width="1"/>`;
    }
    for (let i = 1; i <= levels; i++) {
      const r = (radius / levels) * i;
      svg += `<text x="${cx+5}" y="${cy-r+5}" fill="#c7c7cc" font-size="10" font-family="sans-serif">${Math.round(i*100/levels)}</text>`;
    }
  }

  datasets.forEach((ds, dsi) => {
    if (!ds.dims || ds.dims.length !== dimCount) return;
    let points = '';
    const pts = [];
    for (let j = 0; j < dimCount; j++) {
      const angle = j * angleStep - Math.PI / 2;
      const val = Math.max(0, Math.min(100, ds.dims[j]?.value || 0));
      const r = (val / 100) * radius;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      points += `${x},${y} `;
      pts.push({x, y, val, name: ds.dims[j]?.name, angle});
    }

    if (showFill) {
      svg += `<polygon points="${points}" fill="${ds.color}" fill-opacity="0.15" stroke="none"/>`;
    }
    svg += `<polygon points="${points}" fill="none" stroke="${ds.color}" stroke-width="2.5"/>`;

    if (showPoints) {
      pts.forEach((p, pi) => {
        svg += `<circle cx="${p.x}" cy="${p.y}" r="5" fill="${ds.color}" stroke="#ffffff" stroke-width="2.5"
          onmouseenter="showTip(evt,'${ds.name}','${p.name}',${p.val},'${ds.color}')"
          onmouseleave="hideTip()"/>`;
      });
    }
  });

  if (showLabels) {
    for (let j = 0; j < dimCount; j++) {
      const angle = j * angleStep - Math.PI / 2;
      const labelR = radius + 32;
      const x = cx + labelR * Math.cos(angle);
      const y = cy + labelR * Math.sin(angle);
      const anchor = Math.abs(Math.cos(angle)) < 0.3 ? 'middle' : (Math.cos(angle) > 0 ? 'start' : 'end');
      svg += `<text x="${x}" y="${y+4}" fill="#1d1d1f" font-size="14" font-weight="600" text-anchor="${anchor}" font-family="sans-serif">${dimNames[j]}</text>`;
    }
  }

  const legendY = 30;
  datasets.forEach((ds, i) => {
    const lx = w - 170;
    const ly = legendY + i * 26;
    svg += `<rect x="${lx}" y="${ly-7}" width="12" height="12" rx="3" fill="${ds.color}"/>`;
    svg += `<text x="${lx+18}" y="${ly+3}" fill="#1d1d1f" font-size="12" font-family="sans-serif">${ds.name}</text>`;
  });

  svg += `</svg>`;
  container.innerHTML = '';
  container.appendChild(toolbar);
  container.appendChild(tooltip);
  container.insertAdjacentHTML('beforeend', svg);
}

function showTip(evt, dsName, dimName, val, color) {
  const tip = document.getElementById('tooltip');
  tip.style.display = 'block';
  tip.innerHTML = `<div class="title" style="color:${color}">${dsName}</div><div class="val">${dimName}: <b>${val}</b></div>`;
  tip.style.left = (evt.clientX + 15) + 'px';
  tip.style.top = (evt.clientY - 15) + 'px';
}

function hideTip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ================ 导出 ================
function exportPNG() {
  const container = document.getElementById('graph');
  const svgEl = container.querySelector('svg');
  if (!svgEl) return alert('没有可导出的图表');
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svgEl);
  const canvas = document.createElement('canvas');
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  const img = new Image();
  const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, rect.width, rect.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(b => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = 'radar-chart.png';
      a.click();
    });
  };
  img.src = url;
}

function exportSVG() {
  const svgEl = document.getElementById('graph').querySelector('svg');
  if (!svgEl) return alert('没有可导出的图表');
  const serializer = new XMLSerializer();
  let svgStr = serializer.serializeToString(svgEl);
  svgStr = svgStr.replace(/&nbsp;/g, '&#160;');
  downloadFile('radar-chart.svg', svgStr, 'image/svg+xml');
}

function exportJSON() {
  if (datasets.length === 0) return alert('没有可导出的数据');
  const data = datasets.map(ds => ({
    name: ds.name,
    color: ds.color,
    dims: ds.dims.map(d => ({ name: d.name, value: d.value }))
  }));
  downloadFile('radar-chart.json', JSON.stringify(data, null, 2), 'application/json');
}

function downloadFile(filename, content, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function fitView() {
  render();
}

window.addEventListener('resize', () => {
  render();
});

initUI();
</script>
